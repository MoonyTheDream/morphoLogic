# morphoLogic — Docker Compose
#
# Local dev DB & Kafka only.
# Run the server natively from your venv; .env points at localhost:5432 for the DB,
# and localhost:9092 for Kafka..
#
# Run from this directory, or pass `-f morphoLogicEngine/deployment/docker/docker-compose.yml`.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: morphoLogic_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: morphoLogicServer
      POSTGRES_PASSWORD: morphoLogicTEST
      POSTGRES_DB: morphoLogicDB
    volumes:
      - morphologic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morphoLogicServer -d morphoLogicDB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    restart: unless-stopped

volumes:
  morphologic_pgdata:
    name: morphologic_pgdata
